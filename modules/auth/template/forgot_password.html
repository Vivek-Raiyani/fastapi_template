{% extends "base.html" %}

{% block title %}Forgot password — {{ settings.APP_NAME }}{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Forgot password</h1>
    {% if sent %}
    <div class="alert alert-success">If that email exists, we sent a reset link.</div>
    {% else %}
    <form method="post" action="/auth/forgot-password" class="form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <button type="submit" class="btn">Send reset link</button>
    </form>
    {% endif %}
    <p class="muted"><a href="/auth/login">Back to login</a></p>
</div>
{% endblock %}
