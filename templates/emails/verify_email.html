<!DOCTYPE html>
<html>
<body style="font-family: system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 2rem;">
    <h2>Verify your email</h2>
    <p>Hi{% if user.full_name %} {{ user.full_name }}{% endif %},</p>
    <p>Click the link below to verify your {{ settings.APP_NAME }} account:</p>
    <p><a href="{{ link }}">Verify email</a></p>
    <p style="color: #666; font-size: 0.9rem;">This link expires in 48 hours.</p>
</body>
</html>
