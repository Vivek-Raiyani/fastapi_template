<!DOCTYPE html>
<html>
<body style="font-family: system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 2rem;">
    <h2>Reset your password</h2>
    <p>Hi{% if user.full_name %} {{ user.full_name }}{% endif %},</p>
    <p>We received a request to reset your password. Click below to choose a new one:</p>
    <p><a href="{{ link }}">Reset password</a></p>
    <p style="color: #666; font-size: 0.9rem;">If you did not request this, ignore this email. Link expires in 2 hours.</p>
</body>
</html>
